services:
    postgres:
        image: postgres:18-alpine
        container_name: youandme_postgres
        environment:
            POSTGRES_DB: youandme_api
            POSTGRES_USER: youandme
            POSTGRES_PASSWORD: lokalne
        ports:
            - "5433:5432"
        volumes:
            - youandme_postgres_data:/var/lib/postgresql
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        container_name: youandme_redis
        ports:
            - "6379:6379"
        volumes:
            - youandme_redis_data:/data
        restart: unless-stopped

volumes:
    youandme_postgres_data:
    youandme_redis_data:
